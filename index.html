<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Directory</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Header: branding and navigation -->
    <header class="site-header section-red section-red-dark" id="header">
        <div class="container header-inner">
            <div class="brand">
                <div>
                    <h1>Student Directory</h1>
                    <p class="subtitle">Scores &amp; stats</p>
                </div>
            </div>

            <nav class="nav">
                <a href="#add-student">Add Student</a>
                <a href="#students">Grades</a>
                <a href="#users">Users API</a>
            </nav>
        </div>
    </header>
<!-- Average (#R6: shown above main content) -->
<h1 id="avgGradeTop">Average Grade: 0</h1>
<!-- Main: content wrapper -->
<main>
    <!-- Hero/Section 1: headline metrics -->
    <section id="hero" class="section section-red hero">
        <div class="container hero-inner">
            <div class="hero-panel">
                <div class="hero-value">
                    <span id="avgValue" class="hero-big">70</span>
                    <span class="hero-small">/100</span>
                </div>
            </div>
            <div class="hero-text">
                <p>Current students</p>
                <h2 id="avgGrade">Average Grade</h2>
            </div>
        </div>
    </section>
<!--Section 2: Form to add a new student (#R1: student’s name and grade)-->
<section id="add-student" class="section section-white">
    <div class="container">
        <div class="section-header">
            <h2> Add Student</h2>
            <p>Register new students and their grades.
                <br>
                Grades must be between 0 and 100, and names can not be repeated.
            </p>
        </div>

        <div class="card">
            <form id="studentForm" autocomplete="off">
                <label>
                    Student Name
                    <input id="studentName" name="studentName" type="text" placeholder="e.g., Andrea Moreno" required
                        minlength="2" />
                </label>

                <label>
                    Grade (0 - 100)
                    <input id="studentGrade" name="studentGrade" type="number" placeholder="e.g., 85" required min="0"
                        max="100" />
                </label>

                <div class="row">
                    <!-- (#R4: add a Save button)-->
                    <button type="submit" class="btn">Save</button>
                </div>

                <p id="formMsg" class="msg" aria-live="polite"></p>
            </form>
        </div>
    </div>
</section>
